<button class="icon-btn" id="themeToggle" aria-label="Toggle theme">&#127769;</button><button class="icon-btn menu-btn" id="menuBtn" aria-label="Open menu">&#9776;</button></div></header><div class="overlay" id="overlay"></div><div class="layout"><aside class="sidebar" id="sidebar"><a class="toc-back" href="index.html">&larr; Building Claude Skills</a><h3>On this page</h3><ul class="toc-list" id="tocList"></ul></aside><main class="main" id="main"><section class="hero"><span class="chapter-label">Chapter 02</span><h1>Fundamentals</h1></section></main></div><script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script><script>const MD="# Fundamentals\n\n## What is a skill?\n\nA skill is a folder containing:\n\n- **`SKILL.md`** (required): Instructions in Markdown with YAML frontmatter\n- **`scripts/`** (optional): Executable code (Python, Bash, etc.)\n- **`references/`** (optional): Documentation loaded as needed\n- **`assets/`** (optional): Templates, fonts, icons used in output\n\n## Core design principles\n\n### Progressive disclosure\n\nSkills use a three-level system:\n\n- **First level (YAML frontmatter):** Always loaded in Claude's system prompt. Provides just enough information for Claude to know when each skill should be used without loading all of it into context.\n- **Second level (SKILL.md body):** Loaded when Claude thinks the skill is relevant to the current task. Contains the full instructions and guidance.\n- **Third level (Linked files):** Additional files bundled within the skill directory that Claude can choose to navigate and discover only as needed.\n\nThis progressive disclosure minimizes token usage while maintaining specialized expertise.\n\n### Composability\n\nClaude can load multiple skills simultaneously. Your skill should work well alongside others, not assume it's the only capability available.\n\n### Portability\n\nSkills work identically across Claude.ai, Claude Code, and the API. Create a skill once and it works across all surfaces without modification, provided the environment supports any dependencies the skill requires.\n\n## For MCP builders: Skills + Connectors\n\n> 💡 Building standalone skills without MCP? Skip to *Planning and Design* — you can always return here later.\n\nIf you already have a working MCP server, you've done the hard part. Skills are the knowledge layer on top — capturing the workflows and best practices you already know, so Claude can apply them consistently.\n\n### The kitchen analogy\n\n- **MCP provides the professional kitchen:** access to tools, ingredients, and equipment.\n- **Skills provide the recipes:** step-by-step instructions on how to create something valuable.\n\nTogether, they enable users to accomplish complex tasks without needing to figure out every step themselves.\n\n### How they work together\n\n| MCP (Connectivity) | Skills (Knowledge) |\n|--------------------|--------------------|\n| Connects Claude to your service (Notion, Asana, Linear, etc.) | Teaches Claude how to use your service effectively |\n| Provides real-time data access and tool invocation | Captures workflows and best practices |\n| What Claude *can* do | How Claude *should* do it |\n\n### Why this matters for your MCP users\n\n**Without skills:**\n\n- Users connect your MCP but don't know what to do next\n- Support tickets asking \"how do I do X with your integration\"\n- Each conversation starts from scratch\n- Inconsistent results because users prompt differently each time\n- Users blame your connector when the real issue is workflow guidance\n\n**With skills:**\n\n- Pre-built workflows activate automatically when needed\n- Consistent, reliable tool usage\n- Best practices embedded in every interaction\n- Lower learning curve for your integration\n";marked.setOptions({gfm:true,breaks:false});var m=document.getElementById("main");m.insertAdjacentHTML("beforeend",marked.parse(MD));var _h=document.querySelector(".hero h1"),_c=m.querySelector(":scope > h1");if(_h&&_c&&_c.textContent.trim().toLowerCase()===_h.textContent.trim().toLowerCase())_c.remove();var toc=document.getElementById("tocList"),seen={};m.querySelectorAll("h2").forEach(function(hd){var id=hd.id||hd.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");if(seen[id]){id=id+"-"+(++seen[id])}else{seen[id]=1}hd.id=id;var li=document.createElement("li"),a=document.createElement("a");a.href="#"+id;a.textContent=hd.textContent;li.appendChild(a);toc.appendChild(li);});m.insertAdjacentHTML("beforeend","<nav class=\"chapter-nav\"><a class=\"cn-prev\" href=\"01-introduction.html\"><span>&larr; Previous<\/span><strong>Introduction<\/strong><\/a><a class=\"cn-next\" href=\"03-planning-and-design.html\"><span>Next &rarr;<\/span><strong>Planning and Design<\/strong><\/a><\/nav>");</script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script><script src="../../../assets/system-design.js"></script><script>(function(){if(window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches)return;document.documentElement.classList.add("anim");var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});},{rootMargin:"0px 0px -6% 0px",threshold:.08});document.querySelectorAll(".chapter-card,.home-section-header,.home-intro-card").forEach(function(el,i){el.style.transitionDelay=((i%6)*45)+"ms";io.observe(el);});document.querySelectorAll(".home-stat-num").forEach(function(el){var m=el.textContent.trim().match(/^(\D*)(\d+)(.*)$/);if(!m)return;var pre=m[1],t=parseInt(m[2],10),post=m[3],s=null,dur=900;el.textContent=pre+"0"+post;function f(ts){if(!s)s=ts;var p=Math.min((ts-s)/dur,1);el.textContent=pre+Math.round(t*p)+post;if(p<1)requestAnimationFrame(f);else el.textContent=pre+t+post;}requestAnimationFrame(f);});})();</script></body></html>
