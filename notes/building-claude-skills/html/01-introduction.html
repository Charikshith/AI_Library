<button class="icon-btn" id="themeToggle" aria-label="Toggle theme">&#127769;</button><button class="icon-btn menu-btn" id="menuBtn" aria-label="Open menu">&#9776;</button></div></header><div class="overlay" id="overlay"></div><div class="layout"><aside class="sidebar" id="sidebar"><a class="toc-back" href="index.html">&larr; Building Claude Skills</a><h3>On this page</h3><ul class="toc-list" id="tocList"></ul></aside><main class="main" id="main"><section class="hero"><span class="chapter-label">Chapter 01</span><h1>Introduction</h1></section></main></div><script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script><script>const MD="# Introduction\n\nA **skill** is a set of instructions — packaged as a simple folder — that teaches Claude how to handle specific tasks or workflows. Skills are one of the most powerful ways to customize Claude for your specific needs. Instead of re-explaining your preferences, processes, and domain expertise in every conversation, skills let you teach Claude once and benefit every time.\n\nSkills are powerful when you have repeatable workflows: generating frontend designs from specs, conducting research with consistent methodology, creating documents that follow your team's style guide, or orchestrating multi-step processes. They work with Claude's built-in capabilities like code execution and document creation. For those building MCP integrations, skills add another powerful layer — helping turn raw tool access into reliable, optimized workflows.\n\nThis guide covers everything you need to know to build effective skills — from planning and structure to testing and distribution. Whether you're building a skill for yourself, your team, or for the community, you'll find practical patterns and real-world examples throughout.\n\n## What you'll learn\n\n- Technical requirements and best practices for skill structure\n- Patterns for standalone skills and MCP-enhanced workflows\n- Patterns we've seen work well across different use cases\n- How to test, iterate, and distribute your skills\n\n## Who this is for\n\n- Developers who want Claude to follow specific workflows consistently\n- Power users who want Claude to follow specific workflows\n- Teams looking to standardize how Claude works across their organization\n\n## Two paths through this guide\n\nBuilding **standalone skills**? Focus on *Fundamentals*, *Planning and Design*, and categories 1–2.\n\nEnhancing an **MCP integration**? The \"Skills + MCP\" material and category 3 are for you.\n\nBoth paths share the same technical requirements, but you choose what's relevant to your use case.\n\n## What you'll get out of this guide\n\nBy the end, you'll be able to build a functional skill in a single sitting. Expect about **15–30 minutes** to build and test your first working skill using the `skill-creator`.\n\nLet's get started.\n";marked.setOptions({gfm:true,breaks:false});var m=document.getElementById("main");m.insertAdjacentHTML("beforeend",marked.parse(MD));var _h=document.querySelector(".hero h1"),_c=m.querySelector(":scope > h1");if(_h&&_c&&_c.textContent.trim().toLowerCase()===_h.textContent.trim().toLowerCase())_c.remove();var toc=document.getElementById("tocList"),seen={};m.querySelectorAll("h2").forEach(function(hd){var id=hd.id||hd.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");if(seen[id]){id=id+"-"+(++seen[id])}else{seen[id]=1}hd.id=id;var li=document.createElement("li"),a=document.createElement("a");a.href="#"+id;a.textContent=hd.textContent;li.appendChild(a);toc.appendChild(li);});m.insertAdjacentHTML("beforeend","<nav class=\"chapter-nav\"><span><\/span><a class=\"cn-next\" href=\"02-fundamentals.html\"><span>Next &rarr;<\/span><strong>Fundamentals<\/strong><\/a><\/nav>");</script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script><script src="htt
