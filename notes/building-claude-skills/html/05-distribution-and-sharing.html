bar"><a class="toc-back" href="index.html">&larr; Building Claude Skills</a><h3>On this page</h3><ul class="toc-list" id="tocList"></ul></aside><main class="main" id="main"><section class="hero"><span class="chapter-label">Chapter 05</span><h1>Distribution and Sharing</h1></section></main></div><script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script><script>const MD="# Distribution and Sharing\n\nSkills make your MCP integration more complete. As users compare connectors, those with skills offer a faster path to value, giving you an edge over MCP-only alternatives.\n\n## Current distribution model (January 2026)\n\n**How individual users get skills:**\n\n1. Download the skill folder\n2. Zip the folder (if needed)\n3. Upload to Claude.ai via **Settings > Capabilities > Skills**\n4. Or place in the Claude Code skills directory\n\n**Organization-level skills:**\n\n- Admins can deploy skills workspace-wide (shipped December 18, 2025)\n- Automatic updates\n- Centralized management\n\n## An open standard\n\nAnthropic has published **Agent Skills** as an open standard. Like MCP, the belief is that skills should be portable across tools and platforms — the same skill should work whether you're using Claude or other AI platforms. That said, some skills are designed to take full advantage of a specific platform's capabilities; authors can note this in the skill's `compatibility` field.\n\n## Using skills via API\n\nFor programmatic use cases — such as building applications, agents, or automated workflows that leverage skills — the API provides direct control over skill management and execution.\n\n**Key capabilities:**\n\n- `/v1/skills` endpoint for listing and managing skills\n- Add skills to Messages API requests via the `container.skills` parameter\n- Version control and management through the Claude Console\n- Works with the Claude Agent SDK for building custom agents\n\n**When to use skills via the API vs. Claude.ai:**\n\n| Use Case | Best Surface |\n|----------|--------------|\n| End users interacting with skills directly | Claude.ai / Claude Code |\n| Manual testing and iteration during development | Claude.ai / Claude Code |\n| Individual, ad-hoc workflows | Claude.ai / Claude Code |\n| Applications using skills programmatically | API |\n| Production deployments at scale | API |\n| Automated pipelines and agent systems | API |\n\n> **Note:** Skills in the API require the Code Execution Tool beta, which provides the secure environment skills need to run.\n\nFor implementation details, see: *Skills API Quickstart*, *Create Custom Skills*, and *Skills in the Agent SDK*.\n\n## Recommended approach today\n\nStart by hosting your skill on GitHub with a public repo, a clear README (for human visitors — this is separate from your skill folder, which should **not** contain a `README.md`), and example usage with screenshots. Then add a section to your MCP documentation that links to the skill, explains why using both together is valuable, and provides a quick-start guide.\n\n### 1. Host on GitHub\n\n- Public repo for open-source skills\n- Clear README with installation instructions\n- Example usage and screenshots\n\n### 2. Document in your MCP repo\n\n- Link to skills from MCP documentation\n- Explain the value of using both together\n- Provide a quick-start guide\n\n### 3. Create an installation guide\n\n```\n## Installing the [Your Service] skill\n\n1. Download the skill:\n   - Clone repo: `git clone https://github.com/yourcompany/skills`\n   - Or download ZIP from Releases\n\n2. Install in Claude:\n   - Open Claude.ai > Settings > skills\n   - Click \"Upload skill\"\n   - Select the skill folder (zipped)\n\n3. Enable the skill:\n   - Toggle on the [Your Service] skill\n   - Ensure your MCP server is connected\n\n4. Test:\n   - Ask Claude: \"Set up a new project in [Your Service]\"\n```\n\n## Positioning your skill\n\nHow you describe your skill determines whether users understand its value and actually try it. When writing about your skill — in your README, documentation, or marketing — keep these principles in mind.\n\n**Focus on outcomes, not features:**\n\n✅ Good:\n\n```\n\"The ProjectHub skill enables teams to set up complete project workspaces in\nseconds — including pages, databases, and templates — instead of spending 30\nminutes on manual setup.\"\n```\n\n❌ Bad:\n\n```\n\"The ProjectHub skill is a folder containing YAML frontmatter and Markdown\ninstructions that calls our MCP server tools.\"\n```\n\n**Highlight the MCP + skills story:**\n\n```\n\"Our MCP server gives Claude access to your Linear projects. Our skills teach\nClaude your team's sprint planning workflow. Together, they enable AI-powered\nproject management.\"\n```\n";marked.setOptions({gfm:true,breaks:false});var m=document.getElementById("main");m.insertAdjacentHTML("beforeend",marked.parse(MD));var _h=document.querySelector(".hero h1"),_c=m.querySelector(":scope > h1");if(_h&&_c&&_c.textContent.trim().toLowerCase()===_h.textContent.trim().toLowerCase())_c.remove();var toc=document.getElementById("tocList"),seen={};m.querySelectorAll("h2").forEach(function(hd){var id=hd.id||hd.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");if(seen[id]){id=id+"-"+(++seen[id])}else{seen[id]=1}hd.id=id;var li=document.createElement("li"),a=document.createElement("a");a.href="#"+id;a.textContent=hd.textContent;li.appendChild(a);toc.appendChild(li);});m.insertAdjacentHTML("beforeend","<nav class=\"chapter-nav\"><a class=\"cn-prev\" href=\"04-testing-and-iteration.html\"><span>&larr; Previous<\/span><strong>Testing and Iteration<\/strong><\/a><a class=\"cn-next\" href=\"06-patterns-and-troubleshooting.html\"><span>Next &rarr;<\/span><strong>Patterns and Troubleshooting<\/strong><\/a><\/nav>");</script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></scrip
