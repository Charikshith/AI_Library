./../projects.html">Projects</a><button class="icon-btn" id="themeToggle" aria-label="Toggle theme">&#127769;</button><button class="icon-btn menu-btn" id="menuBtn" aria-label="Open menu">&#9776;</button></div></header><div class="overlay" id="overlay"></div><div class="layout"><aside class="sidebar" id="sidebar"><a class="toc-back" href="index.html">&larr; Building Claude Skills</a><h3>On this page</h3><ul class="toc-list" id="tocList"></ul></aside><main class="main" id="main"><section class="hero"><span class="chapter-label">Chapter 06</span><h1>Patterns and Troubleshooting</h1></section></main></div><script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script><script>const MD="# Patterns and Troubleshooting\n\nThese patterns emerged from skills created by early adopters and internal teams. They represent common approaches we've seen work well, not prescriptive templates.\n\n## Choosing your approach: problem-first vs. tool-first\n\nThink of it like Home Depot. You might walk in with a problem — \"I need to fix a kitchen cabinet\" — and an employee points you to the right tools. Or you might pick out a new drill and ask how to use it for your specific job.\n\nSkills work the same way:\n\n- **Problem-first:** \"I need to set up a project workspace\" → Your skill orchestrates the right MCP calls in the right sequence. Users describe outcomes; the skill handles the tools.\n- **Tool-first:** \"I have Notion MCP connected\" → Your skill teaches Claude the optimal workflows and best practices. Users have access; the skill provides expertise.\n\nMost skills lean one direction. Knowing which framing fits your use case helps you choose the right pattern below.\n\n## Pattern 1: Sequential workflow orchestration\n\n**Use when:** Your users need multi-step processes in a specific order.\n\n```\n## Workflow: Onboard New Customer\n\n### Step 1: Create Account\nCall MCP tool: `create_customer`\nParameters: name, email, company\n\n### Step 2: Setup Payment\nCall MCP tool: `setup_payment_method`\nWait for: payment method verification\n\n### Step 3: Create Subscription\nCall MCP tool: `create_subscription`\nParameters: plan_id, customer_id (from Step 1)\n\n### Step 4: Send Welcome Email\nCall MCP tool: `send_email`\nTemplate: welcome_email_template\n```\n\nKey techniques: explicit step ordering; dependencies between steps; validation at each stage; rollback instructions for failures.\n\n## Pattern 2: Multi-MCP coordination\n\n**Use when:** Workflows span multiple services. *Example: Design-to-development handoff.*\n\n```\n### Phase 1: Design Export (Figma MCP)\n1. Export design assets from Figma\n2. Generate design specifications\n3. Create asset manifest\n\n### Phase 2: Asset Storage (Drive MCP)\n1. Create project folder in Drive\n2. Upload all assets\n3. Generate shareable links\n\n### Phase 3: Task Creation (Linear MCP)\n1. Create development tasks\n2. Attach asset links to tasks\n3. Assign to engineering team\n\n### Phase 4: Notification (Slack MCP)\n1. Post handoff summary to #engineering\n2. Include asset links and task references\n```\n\nKey techniques: clear phase separation; data passing between MCPs; validation before moving to next phase; centralized error handling.\n\n## Pattern 3: Iterative refinement\n\n**Use when:** Output quality improves with iteration. *Example: Report generation.*\n\n```\n## Iterative Report Creation\n\n### Initial Draft\n1. Fetch data via MCP\n2. Generate first draft report\n3. Save to temporary file\n\n### Quality Check\n1. Run validation script: `scripts/check_report.py`\n2. Identify issues:\n    - Missing sections\n    - Inconsistent formatting\n    - Data validation errors\n\n### Refinement Loop\n1. Address each identified issue\n2. Regenerate affected sections\n3. Re-validate\n4. Repeat until quality threshold met\n\n### Finalization\n1. Apply final formatting\n2. Generate summary\n3. Save final version\n```\n\nKey techniques: explicit quality criteria; iterative improvement; validation scripts; know when to stop iterating.\n\n## Pattern 4: Context-aware tool selection\n\n**Use when:** Same outcome, different tools depending on context. *Example: File storage.*\n\n```\n## Smart File Storage\n\n### Decision Tree\n1. Check file type and size\n2. Determine best storage location:\n    - Large files (>10MB): Use cloud storage MCP\n    - Collaborative docs: Use Notion/Docs MCP\n    - Code files: Use GitHub MCP\n    - Temporary files: Use local storage\n\n### Execute Storage\nBased on decision:\n- Call appropriate MCP tool\n- Apply service-specific metadata\n- Generate access link\n\n### Provide Context to User\nExplain why that storage was chosen\n```\n\nKey techniques: clear decision criteria; fallback options; transparency about choices.\n\n## Pattern 5: Domain-specific intelligence\n\n**Use when:** Your skill adds specialized knowledge beyond tool access. *Example: Financial compliance.*\n\n```\n## Payment Processing with Compliance\n\n### Before Processing (Compliance Check)\n1. Fetch transaction details via MCP\n2. Apply compliance rules:\n    - Check sanctions lists\n    - Verify jurisdiction allowances\n    - Assess risk level\n3. Document compliance decision\n\n### Processing\nIF compliance passed:\n  - Call payment processing MCP tool\n  - Apply appropriate fraud checks\n  - Process transaction\nELSE:\n  - Flag for review\n  - Create compliance case\n\n### Audit Trail\n- Log all compliance checks\n- Record processing decisions\n- Generate audit report\n```\n\nKey techniques: domain expertise embedded in logic; compliance before action; comprehensive documentation; clear governance.\n\n---\n\n## Troubleshooting\n\n### Skill won't upload\n\n**Error: \"Could not find SKILL.md in uploaded folder\"**\nCause: File not named exactly `SKILL.md`.\nSolution: Rename to `SKILL.md` (case-sensitive); verify with `ls -la` (should show `SKILL.md`).\n\n**Error: \"Invalid frontmatter\"**\nCause: YAML formatting issue. Common mistakes:\n\n```\n# Wrong - missing delimiters\nname: my-skill\ndescription: Does things\n\n# Wrong - unclosed quotes\nname: my-skill\ndescription: \"Does things\n\n# Correct\n---\nname: my-skill\ndescription: Does things\n---\n```\n\n**Error: \"Invalid skill name\"**\nCause: Name has spaces or capitals.\n\n```\n# Wrong\nname: My Cool Skill\n\n# Correct\nname: my-cool-skill\n```\n\n### Skill doesn't trigger\n\n**Symptom:** Skill never loads automatically.\n**Fix:** Revise your description field (see *The Description Field* for good/bad examples).\n\nQuick checklist: Is it too generic? (\"Helps with projects\" won't work.) Does it include trigger phrases users would actually say? Does it mention relevant file types if applicable?\n\n**Debugging approach:** Ask Claude *\"When would you use the [skill name] skill?\"* — Claude will quote the description back. Adjust based on what's missing.\n\n### Skill triggers too often\n\n**Symptom:** Skill loads for unrelated queries.\n\n1. **Add negative triggers**\n   ```\n   description: Advanced data analysis for CSV files. Use for statistical\n   modeling, regression, clustering. Do NOT use for simple data exploration\n   (use data-viz skill instead).\n   ```\n2. **Be more specific**\n   ```\n   # Too broad\n   description: Processes documents\n\n   # More specific\n   description: Processes PDF legal documents for contract review\n   ```\n3. **Clarify scope**\n   ```\n   description: PayFlow payment processing for e-commerce. Use specifically for\n   online payment workflows, not for general financial queries.\n   ```\n\n### MCP connection issues\n\n**Symptom:** Skill loads but MCP calls fail. Checklist:\n\n1. **Verify MCP server is connected** — Claude.ai: Settings > Extensions > [Your Service]; should show \"Connected\" status.\n2. **Check authentication** — API keys valid and not expired; proper permissions/scopes granted; OAuth tokens refreshed.\n3. **Test MCP independently** — Ask Claude to call MCP directly (without skill): \"Use [Service] MCP to fetch my projects.\" If this fails, the issue is MCP, not the skill.\n4. **Verify tool names** — Skill references correct MCP tool names; check MCP server documentation; tool names are case-sensitive.\n\n### Instructions not followed\n\n**Symptom:** Skill loads but Claude doesn't follow instructions. Common causes:\n\n1. **Instructions too verbose** — Keep instructions concise; use bullet points and numbered lists; move detailed reference to separate files.\n2. **Instructions buried** — Put critical instructions at the top; use `## Important` or `## Critical` headers; repeat key points if needed.\n3. **Ambiguous language**\n   ```\n   # Bad\n   Make sure to validate things properly\n\n   # Good\n   CRITICAL: Before calling create_project, verify:\n   - Project name is non-empty\n   - At least one team member assigned\n   - Start date is not in the past\n   ```\n   *Advanced technique:* For critical validations, consider bundling a script that performs the checks programmatically rather than relying on language instructions. Code is deterministic; language interpretation isn't. (See Office skills for examples of this pattern.)\n4. **Model \"laziness\"** — Add explicit encouragement:\n   ```\n   ## Performance Notes\n   - Take your time to do this thoroughly\n   - Quality is more important than speed\n   - Do not skip validation steps\n   ```\n   Note: Adding this to user prompts is more effective than in SKILL.md.\n\n### Large context issues\n\n**Symptom:** Skill seems slow or responses degraded.\n**Causes:** Skill content too large; too many skills enabled simultaneously; all content loaded instead of progressive disclosure.\n\n**Solutions:**\n\n1. **Optimize SKILL.md size** — Move detailed docs to `references/`; link to references instead of inline; keep SKILL.md under 5,000 words.\n2. **Reduce enabled skills** — Evaluate if you have more than 20–50 skills enabled simultaneously; recommend selective enablement; consider skill \"packs\" for related capabilities.\n";marked.set *45)+"ms";io.observe(el);});document.querySelectorAll(".home-stat-num").forEach(function(el){var m=el.textContent.trim().match(/^(\D*)(\d+)(.*)$/);if(!m)return;var pre=m[1],t=parseInt(m[2],10),post=m[3],s=null,dur=900;el.textContent=pre+"0"+post;function f(ts){if(!s)s=ts;var p=Math.min((ts-s)/dur,1);el.textContent=pre+Math.round(t*p)+post;if(p<1)requestAnimationFrame(f);else el.textContent=pre+t+post;}requestAnimationFrame(f);});})();</script></body></html>
