sprint with tasks created\n```\n\n**Ask yourself:**\n\n- What does a user want to accomplish?\n- What multi-step workflows does this require?\n- Which tools are needed (built-in or MCP)?\n- What domain knowledge or best practices should be embedded?\n\n## Common skill use case categories\n\nAt Anthropic, we've observed three common use cases:\n\n### Category 1: Document & Asset Creation\n\nUsed for: Creating consistent, high-quality output including documents, presentations, apps, designs, code, etc.\n\n*Real example:* `frontend-design` skill (also see skills for docx, pptx, xlsx, and ppt).\n\n> \"Create distinctive, production-grade frontend interfaces with high design quality. Use when building web components, pages, artifacts, posters, or applications.\"\n\nKey techniques:\n\n- Embedded style guides and brand standards\n- Template structures for consistent output\n- Quality checklists before finalizing\n- No external tools required — uses Claude's built-in capabilities\n\n### Category 2: Workflow Automation\n\nUsed for: Multi-step processes that benefit from consistent methodology, including coordination across multiple MCP servers.\n\n*Real example:* `skill-creator` skill.\n\n> \"Interactive guide for creating new skills. Walks the user through use case definition, frontmatter generation, instruction writing, and validation.\"\n\nKey techniques:\n\n- Step-by-step workflow with validation gates\n- Templates for common structures\n- Built-in review and improvement suggestions\n- Iterative refinement loops\n\n### Category 3: MCP Enhancement\n\nUsed for: Workflow guidance to enhance the tool access an MCP server provides.\n\n*Real example:* `sentry-code-review` skill (from Sentry).\n\n> \"Automatically analyzes and fixes detected bugs in GitHub Pull Requests using Sentry's error monitoring data via their MCP server.\"\n\nKey techniques:\n\n- Coordinates multiple MCP calls in sequence\n- Embeds domain expertise\n- Provides context users would otherwise need to specify\n- Error handling for common MCP issues\n\n## Define success criteria\n\nHow will you know your skill is working? These are aspirational targets — rough benchmarks rather than precise thresholds. Aim for rigor but accept that there will be an element of vibes-based assessment. Anthropic is actively developing more robust measurement guidance and tooling.\n\n**Quantitative metrics:**\n\n- **Skill triggers on 90% of relevant queries** — *How to measure:* Run 10–20 test queries that should trigger your skill. Track how many times it loads automatically vs. requires explicit invocation.\n- **Completes workflow in X tool calls** — *How to measure:* Compare the same task with and without the skill enabled. Count tool calls and total tokens consumed.\n- **0 failed API calls per workflow** — *How to measure:* Monitor MCP server logs during test runs. Track retry rates and error codes.\n\n**Qualitative metrics:**\n\n- **Users don't need to prompt Claude about next steps** — *How to assess:* During testing, note how often you need to redirect or clarify. Ask beta users for feedback.\n- **Workflows complete without user correction** — *How to assess:* Run the same task 3–5 times. Compare outputs for structural consistency and quality.\n- **Consistent results across sessions** — *How to assess:* Can a new user accomplish the task on first try with minimal guidance?\n\n## Technical requirements\n\n### File structure\n\n```\nyour-skill-name/\n├── SKILL.md              # Required - main skill file\n├── scripts/              # Optional - executable code\n│   ├── process_data.py   # Example\n│   └── validate.sh       # Example\n├── references/           # Optional - documentation\n│   ├── api-guide.md      # Example\n│   └── examples/         # Example\n└── assets/               # Optional - templates, etc.\n    └── report-template.md # Example\n```\n\n### Critical rules\n\n**SKILL.md naming:**\n\n- Must be exactly `SKILL.md` (case-sensitive)\n- No variations accepted (`SKILL.MD`, `skill.md`, etc.)\n\n**Skill folder naming:**\n\n- Use kebab-case: `notion-project-setup` ✅\n- No spaces: `Notion Project Setup` ❌\n- No underscores: `notion_project_setup` ❌\n- No capitals: `NotionProjectSetup` ❌\n\n**No README.md:**\n\n- Don't include `README.md` inside your skill folder\n- All documentation goes in `SKILL.md` or `references/`\n- Note: when distributing via GitHub, you'll still want a repo-level README for human users — see *Distribution and Sharing*.\n\n## YAML frontmatter: the most important part\n\nThe YAML frontmatter is how Claude decides whether to load your skill. Get this right.\n\n**Minimal required format:**\n\n```yaml\n---\nname: your-skill-name\ndescription: What it does. Use when user asks to [specific phrases].\n---\n```\n\nThat's all you need to start.\n\n### Field requirements\n\n**`name`** (required):\n\n- kebab-case only\n- No spaces or capitals\n- Should match folder name\n\n**`description`** (required) — MUST include BOTH:\n\n- What the skill does\n- When to use it (trigger conditions)\n\nPlus: under 1024 characters; no XML tags (`<` or `>`); include specific tasks users might say; mention file types if relevant.\n\n**`license`** (optional): Use if making skill open source. Common: MIT, Apache-2.0.\n\n**`compatibility`** (optional): 1–500 characters. Indicates environment requirements: e.g. intended product, required system packages, network access needs, etc.\n\n**`metadata`** (optional): Any custom key-value pairs. Suggested: author, version, mcp-server.\n\n```yaml\nmetadata:\n    author: ProjectHub\n    version: 1.0.0\n    mcp-server: projecthub\n```\n\n### Security restrictions\n\nForbidden in frontmatter:\n\n- XML angle brackets (`<` `>`)\n- Skills with \"claude\" or \"anthropic\" in the name (reserved)\n\n**Why:** Frontmatter appears in Claude's system prompt. Malicious content could inject instructions.\n\n## Writing effective skills\n\n### The description field\n\nAccording to Anthropic's engineering blog: *\"This metadata… provides just enough information for Claude to know when each skill should be used without loading all of it into context.\"* This is the first level of progressive disclosure.\n\n**Structure:**\n\n```\n[What it does] + [When to use it] + [Key capabilities]\n```\n\n**Examples of good descriptions:**\n\n```\n# Good - specific and actionable\ndescription: Analyzes Figma design files and generates developer handoff\ndocumentation. Use when user uploads .fig files, asks for \"design specs\",\n\"component documentation\", or \"design-to-code handoff\".\n\n# Good - includes trigger phrases\ndescription: Manages Linear project workflows including sprint planning, task\ncreation, and status tracking. Use when user mentions \"sprint\", \"Linear tasks\",\n\"project planning\", or asks to \"create tickets\".\n\n# Good - clear value proposition\ndescription: End-to-end customer onboarding workflow for PayFlow. Handles account\ncreation, payment setup, and subscription management. Use when user says \"onboard\nnew customer\", \"set up subscription\", or \"create PayFlow account\".\n```\n\n**Examples of bad descriptions:**\n\n```\n# Too vague\ndescription: Helps with projects.\n\n# Missing triggers\ndescription: Creates sophisticated multi-page documentation systems.\n\n# Too technical, no user triggers\ndescription: Implements the Project entity model with hierarchical relationships.\n```\n\n### Writing the main instructions\n\nAfter the frontmatter, write the actual instructions in Markdown.\n\n**Recommended structure** — adapt this template for your skill; replace bracketed sections with your specific content:\n\n````\n---\nname: your-skill\ndescription: [...]\n---\n\n# Your Skill Name\n\n## Instructions\n\n### Step 1: [First Major Step]\nClear explanation of what happens.\n\nExample:\n```bash\npython scripts/fetch_data.py --project-id PROJECT_ID\n```\nExpected output: [describe what success looks like]\n\n(Add more steps as needed)\n\n## Examples\n\n### Example 1: [common scenario]\nUser says: \"Set up a new marketing campaign\"\nActions:\n1. Fetch existing campaigns via MCP\n2. Create new campaign with provided parameters\nResult: Campaign created with provided link\n\n(Add more examples as needed)\n\n## Troubleshooting\n\nError: [Common error message]\nCause: [Why it happens]\nSolution: [How to fix]\n\n(Add more error cases as needed)\n````\n\n### Best practices for instructions\n\n**Be specific and actionable**\n\n✅ Good:\n\n```\nRun `python scripts/validate.py --input {filename}` to check data format.\nIf validation fails, common issues include:\n- Missing required fields (add them to the CSV)\n- Invalid date formats (use YYYY-MM-DD)\n```\n\n❌ Bad:\n\n```\nValidate the data before proceeding.\n```\n\n**Include error handling**\n\n```\n## Common Issues\n\n### MCP Connection Failed\nIf you see \"Connection refused\":\n1. Verify MCP server is running: Check Settings > Extensions\n2. Confirm API key is valid\n3. Try reconnecting: Settings > Extensions > [Your Service] > Reconnect\n```\n\n**Reference bundled resources clearly**\n\n```\nBefore writing queries, consult `references/api-patterns.md` for:\n- Rate limiting guidance\n- Pagination patterns\n- Error codes and handling\n```\n\n**Use progressive disclosure** — Keep SKILL.md focused on core instructions. Move detailed documentation to `references/` and link to it. (See *Core Design Principles* for how the three-level system works.)\n";marked.setOptions({gfm:true,breaks:false});var m=document.getElementById("main");m.insertAdjacentHTML("beforeend",marked.parse(MD));var _h=document.querySelector(".hero h1"),_c=m.querySelector(":scope > h1");if(_h&&_c&&_c.textContent.trim().toLowerCase()===_h.textContent.trim().toLowerCase())_c.remove();var toc=document.getElementById("tocList"),seen={};m.querySelectorAll("h2").forEach(function(hd){var id=hd.id||hd.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");if(seen[id]){id=id+"-"+(++seen[id])}else{seen[id]=1}hd.id=id;var li=document.createElement("li"),a=document.createElement("a");a.href="#"+id;a.textContent=hd.textContent;li.appendChild(a);toc.appendChild(li);});</script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script><script src="../../../assets/system-design.js"></script><script>(function(){if(window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches)return;document.documentElement.classList.add("anim");var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});},{rootMargin:"0px 0px -6% 0px",threshold:.08});document.querySelectorAll(".chapter-card,.home-section-header,.home-intro-card").forEach(function(el,i){el.style.transitionDelay=((i%6)*45)+"ms";io.observe(el);});document.querySelectorAll(".home-stat-num").forEach(function(el){var m=el.textContent.trim().match(/^(\D*)(\d+)(.*)$/);if(!m)return;var pre=m[1],t=parseInt(m[2],10),post=m[3],s=null,dur=900;el.textContent=pre+"0"+post;function f(ts){if(!s)s=ts;var p=Math.min((ts-s)/dur,1);el.textContent=pre+Math.round(t*p)+post;if(p<1)requestAnimationFrame(f);else el.textContent=pre+t+post;}requestAnimationFrame(f);});})();</script></body></html>
