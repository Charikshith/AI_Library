## 🏠 Start Here — TONY

**TONY** is a small, hackable coding agent that runs in your terminal — a from-scratch cousin of Claude Code. It chats, reads and searches your files, edits them (with confirmation), and runs shell commands, all from one prompt.

![TONY — the agent's REPL, themed Iron-Man gold & red](assets/tony-repl.png)

### What it can do
- **Explore** a codebase — `read_file`, `read_directory`, `glob`, `grep`
- **Edit** files — `write_file` (shows a diff and asks before overwriting)
- **Run commands** — `bash` (asks before anything risky or unrecognized)
- **Hold a conversation** — a REPL that remembers the whole session, with streaming replies

### Run it in 3 steps
```powershell
# 1) install (with uv)
uv sync

# 2) create a .env with your endpoint
#    OPENAI_API_KEY=your-key
#    OPENAI_BASE_URL=https://api.openai.com/v1   (or a local / 3rd-party endpoint)
#    OPENAI_MODEL=gpt-4o                          (or kimi-k2.5, a local model, ...)

# 3) launch
tony                                   # interactive REPL (the banner above)
tony --prompt "explain config.py"      # one-shot, then exit
```
No `uv`? `pip install openai python-dotenv rich pyfiglet`, then `python main.py`. Quit the REPL with `/exit`, `/quit`, or `Ctrl+C`.

### The code — six small modules
| File | Job |
|---|---|
| `config.py` | load settings from `.env` |
| `llm_client.py` | stream responses from the LLM |
| `tools.py` | the six tools + their schemas |
| `agent.py` | the agent loop (`agent_turn`) |
| `banner.py` | the TONY startup banner |
| `main.py` | CLI + REPL wiring |

### Want to see how it was built?
Everything below is the **build log** — eight stages from a single chat call to this CLI. Skim the roadmap in **Overview** just below, then read the stages in order. New to the code itself? Follow `config.py` → `llm_client.py` → `tools.py` → `agent.py` → `main.py`.

---

> **Status:** 🏁 **8 stages — a modular, polished CLI agent.** 6 tools (`read_file`, `read_directory`, `glob`, `grep`, `write_file`, `bash`), a multi-turn REPL with conversation memory, streaming, confirm-before-write/run safety, and a `rich` + `pyfiglet` startup banner. Code is split into focused modules.
> **Stack:** OpenAI-compatible endpoint from `.env`. Currently `kimi-k2.5` @ `https://llm.kimchi.dev/openai/v1`; also works against a local server (e.g. llama.cpp). Deps: `openai`, `rich`, `pyfiglet`.
> **Files:** `config.py` · `llm_client.py` · `tools.py` · `agent.py` · `banner.py` · `main.py`

## Step 2: llm_client.py

### What we learned
- `await` only works inside `async def` functions — not at the top level of a file
- `AsyncOpenAI` is the async version of the OpenAI client (uses `await` instead of blocking)
- `stream=True` makes the API return chunks one at a time instead of waiting for the full response
- `async for` iterates over an async generator — yields each chunk as it arrives
- `chunk.choices[0].delta.content` contains one text token per chunk
- `yield` inside an `async def` makes it an **async generator** — callers use `async for`
- `__init__` has **two** underscores on each side — `__init__` not `__init_`

1. Used `await` at top level → must be inside `async def`
2. Wrong import: `from openpyxl.descriptors import base` (Excel library!) → removed
3. Wrong URL: `https://127.0.0.8000/v1` → `http://127.0.0.1:8080/v1`

### Code written

> ℹ️ **Stage 1 version** (text-only streaming, no tools) — superseded in Stage 2. See *Stage 2 → Modified code* below for the current file on disk.

```python
# no_code/llm_client.py
from openai import AsyncOpenAI

class LLMClient:
    def __init__(self, api_key, base_url, model):
        self.model = model
        self._client = AsyncOpenAI(api_key=api_key, base_url=base_url)

    async def chat_stream(self, messages):
        stream = await self._client.chat.completions.create(
            model=self.model, messages=messages, stream=True,
        )
        async for chunk in stream:
            if chunk.choices and chunk.choices[0].delta.content:
                yield chunk.choices[0].delta.content
```

### Key concepts
- **Async generator:** A function with `async def` + `yield`. Callers iterate with `async for`.
- **Streaming:** The API sends tokens as they're generated. `stream=True` enables this.
- **`max_tokens`:** Optional limit on response length. We'll add this later.

## Stage 2: Advertise the Read Tool

### Goal
Tell the LLM it has a `read_file` tool. When the LLM requests to use it, detect and display the request — but DO NOT execute anything.

### How OpenAI function calling works
- You send `tools` alongside `messages` in the API call
- The LLM may respond with `tool_calls` instead of `content`
- Each tool call has: `id` (unique call ID), `name` (tool name), `arguments` (JSON string)
- In streaming mode, tool calls arrive in fragments across multiple chunks
- You must accumulate fragments, then parse the complete JSON at the end

### Tool definition (sent to the LLM)
```python
tools = [{
    "type": "function",
    "function": {
        "name": "read_file",
        "description": "Read a file from the local filesystem.",
        "parameters": {
            "type": "object",
            "properties": {
                "path": {
                    "type": "string",
                    "description": "Path to the file."
                }
            },
            "required": ["path"]
        }
    }
}]
```

### What changes

**llm_client.py:**
- `chat_stream()` needs a `tools` parameter (optional, defaults to `None`)
- When `tools` is provided, pass it to `chat.completions.create(tools=tools)`
- Accumulate tool call fragments from chunks:
  - `chunk.choices[0].delta.tool_calls[0].function.name` — tool name (may come once)
  - `chunk.choices[0].delta.tool_calls[0].function.arguments` — JSON fragments (multiple chunks!)
  - `chunk.choices[0].delta.tool_calls[0].id` — unique call ID
- After all chunks, parse the accumulated arguments JSON
- Yield `("tool_call", {"id": ..., "name": ..., "arguments": {...}})` for each complete tool call
- Yield `("text", token)` for regular text, `("done", None)` at the end

**main.py:**
- Define the `read_file` tool definition
- Pass it to `client.chat_stream(messages, tools=tools)`
- Handle the new event types from the stream:
  - `("text", token)` → print the token (same as Stage 1)
  - `("tool_call", data)` → print what the LLM wants to call, but don't execute
  - `("done", None)` → stream finished

### Streaming flow with tools
```
Chunk 1:  delta.content = None,  delta.tool_calls = [{index:0, function: {name:"read_file", arguments:"{"}}]
Chunk 2:  delta.content = None,  delta.tool_calls = [{index:0, function: {arguments:'"path"'}}]
Chunk 3:  delta.content = None,  delta.tool_calls = [{index:0, function: {arguments:'":"'}}]
Chunk 4:  delta.content = None,  delta.tool_calls = [{index:0, function: {arguments:'py'}}]
... 
Chunk N:  delta.content = None,  delta.tool_calls = [{index:0, function: {arguments:'"}'}}]
→ Accumulate: '{"path":"pyproject.toml"}'
→ Parse JSON: {"path": "pyproject.toml"}
→ Yield: ("tool_call", {"id": "call_xyz", "name": "read_file", "arguments": {"path": "pyproject.toml"}})
```

### Key thing to watch for
Your Gemma model produces `reasoning_content` chunks before the actual tool call — these have `delta.content = None` and no tool calls. Just skip them.

### Successful test looks like
```
$ python main.py --prompt "Read pyproject.toml"
LLM wants to call: read_file (path='pyproject.toml')
XXX Tool execution disabled at Stage 2
```

**llm_client.py changes:**

#### Current `llm_client.py` (matches disk; whitespace tidied)
```python
# no_code/llm_client.py
from openai import AsyncOpenAI
import json
from collections.abc import AsyncIterator
from typing import Any

class LLMClient:
    def __init__(self, api_key, base_url, model):
        self.model = model
        self._client = AsyncOpenAI(api_key=api_key, base_url=base_url)

    async def chat_stream(self, messages, tools=None) -> AsyncIterator[tuple[str, Any]]:
        kwargs = {"model": self.model, "messages": messages, "stream": True}
        if tools:
            kwargs["tools"] = tools

        stream = await self._client.chat.completions.create(**kwargs)

        tools_buffers = {}  # index -> {id, name, args}

        async for chunk in stream:
            if not chunk.choices:  # covers both None and an empty list
                continue
            delta = chunk.choices[0].delta

            if delta.content:
                yield ("text", delta.content)

            if delta.tool_calls:
                for tc in delta.tool_calls:
                    idx = tc.index
                    if idx not in tools_buffers:
                        tools_buffers[idx] = {"id": "", "name": "", "args": ""}
                    if tc.id:
                        tools_buffers[idx]["id"] = tc.id
                    if tc.function and tc.function.name:
                        tools_buffers[idx]["name"] += tc.function.name
                    if tc.function and tc.function.arguments:
                        tools_buffers[idx]["args"] += tc.function.arguments

        # After stream ends, emit completed tool calls
        for buf in tools_buffers.values():
            try:
                args = json.loads(buf["args"])
            except json.JSONDecodeError:
                args = {}  # empty/partial args string — don't crash the stream
            yield ("tool_call", {"id": buf["id"], "name": buf["name"], "arguments": args})

        yield ("done", None)
```

### What we learned
- OpenAI's tool calling uses the same streaming API as chat — same `chat.completions.create()` call

## Stage 3: Execute the Tool & Loop

### Goal
Stop just *detecting* the `read_file` call — actually **run it**, feed the result back to the model, and call the model again so it can answer using the file contents. This request → execute → feed back → answer cycle is the **agent loop**.

### The agent loop (per user turn)

<div class="hdiagram loop">
<div class="node">Build messages<small>system + user</small></div>
<div class="conn">&#9660;</div>
<div class="node accent">Stream reply<small>collect text + tool_calls</small></div>
<div class="conn">&#9660;</div>
<div class="node decision">Any tool_calls?</div>
<div class="branches"><div class="branch"><span class="blabel no">NO</span><div class="node stop">Save answer &rarr; STOP</div></div><div class="branch"><span class="blabel yes">YES</span><div class="node">For each call<small>1&nbsp;&middot; append request&nbsp;&nbsp; 2&nbsp;&middot; run tool&nbsp;&nbsp; 3&nbsp;&middot; append result</small></div></div></div>
<div class="loopback">&#8634; loop back &mdash; results now in context</div>
</div>

```
build messages (system + user)
repeat (capped at 5):
    stream a reply, collecting text + tool_calls
    if no tool_calls -> save the answer, STOP
    else for each tool_call:
        append the assistant's request to messages
        run the tool
        append the tool result to messages
    (loop back -> model is re-called with the results in context)
```

### The message protocol (the part that bites everyone)
After the model asks for a tool, **two** messages get appended before re-calling:

1. **Assistant request** — echo back what it asked for. Gotcha: `arguments` must be a JSON **string**, so `json.dumps()` the dict our client parsed:
   ```python
   {"role": "assistant", "content": None,
    "tool_calls": [{"id": tc["id"], "type": "function",
                    "function": {"name": tc["name"], "arguments": json.dumps(tc["arguments"])}}]}
   ```
2. **Tool result** — one per call, linked by `tool_call_id`:
   ```python
   {"role": "tool", "tool_call_id": tc["id"], "content": result}
   ```
If the IDs don't match or message (1) is missing, the API rejects the next call with *"messages with role 'tool' must be a response to a preceding message with tool_calls."*

### Mistakes made & fixed
1. Left the Stage 2 code in the `tool_call` branch (printed "disabled") instead of `tool_calls.append(data)` → `tool_calls` stayed empty, so the tool never ran.
2. Missing the `if not tool_calls: break` + the feedback block → the loop re-sent the *same* messages and printed "disabled" 5× (one API call per spin).
3. `from email import message` — an editor auto-import when typing `message`; it's the unrelated stdlib `email` module. Removed.
4. `message.append([ {...} ])` → wrong variable (`message` vs `messages`) **and** the dict was wrapped in a list. Fixed to `messages.append({...})`.

### Code written
```python
# no_code/main.py  (Stage 3 — matches disk; whitespace tidied)
import argparse
import asyncio
import json

from config import Config
from llm_client import LLMClient

tools = [{
    "type": "function",
    "function": {
        "name": "read_file",
        "description": "Read a file from the local filesystem.",
        "parameters": {
            "type": "object",
            "properties": {
                "path": {"type": "string", "description": "Path to the file."}
            },
            "required": ["path"],
        },
    },
}]


def read_file(path):
    try:
        with open(path, encoding="utf-8", errors="replace") as f:
            return f.read()
    except Exception as e:
        return f"Error reading {path}: {e}"


async def main():
    parser = argparse.ArgumentParser()
    parser.add_argument("--prompt", type=str, default=None)
    args = parser.parse_args()

    cfg = Config.from_env()
    client = LLMClient(cfg.api_key, cfg.base_url, cfg.model)

    prompt = args.prompt or input("You: ")
    messages = [
        {"role": "system", "content": "You are a coding assistant with a working read_file tool. "
                                       "When you need a file, call it; I will run it and return the "
                                       "contents, then you answer."},
        {"role": "user", "content": prompt},
    ]

    for _ in range(5):  # iteration cap: stop a tool-happy model looping forever
        text = ""
        tool_calls = []

        async for event_type, data in client.chat_stream(messages=messages, tools=tools):
            if event_type == "text":
                text += data
                print(data, end="", flush=True)
            elif event_type == "tool_call":
                tool_calls.append(data)
            elif event_type == "done":
                pass

        # No tool calls -> the model gave its final answer. Save it and stop.
        if not tool_calls:
            messages.append({"role": "assistant", "content": text})
            break

        # Otherwise: run each requested tool and feed the result back, then loop.
        for tc in tool_calls:
            # (a) echo the assistant's request — arguments must be a JSON *string*
            messages.append({
                "role": "assistant",
                "content": None,
                "tool_calls": [{
                    "id": tc["id"],
                    "type": "function",
                    "function": {"name": tc["name"], "arguments": json.dumps(tc["arguments"])},
                }],
            })
            # (b) run the tool, append result linked by tool_call_id
            path = tc["arguments"]["path"]
            print(f"\n[running read_file: {path}]")
            result = read_file(path)
            messages.append({"role": "tool", "tool_call_id": tc["id"], "content": result})

    print()


if __name__ == "__main__":
    asyncio.run(main())
```

### What we learned
- The agent loop = stream → if tool calls, run them and append results → re-call; else stop.
- Tool args come back from our client as a **dict**, but the assistant-history message needs them re-serialized with `json.dumps()` (a string).
- Every `tool` message must pair with a preceding assistant `tool_calls` message sharing the same `id`.
- An iteration cap (`range(5)`) is a cheap guard against a model that keeps calling tools forever.
- Type checkers can't narrow `data` by the `event_type` string (separate variables), so an untyped generator makes `data` a `str | dict | None` union and flags `text += data`. Fix at the source: annotate `chat_stream` as `-> AsyncIterator[tuple[str, Any]]` (makes `data` an `Any`), which is what `legacy` does.

## Stage 4: Explore the Codebase (multiple read tools)

### Goal
Give the model more ways to look around — `read_directory`, `glob` (find files by pattern), `grep` (search contents) — not just read one named file. The model can now chain tools across loop iterations to explore a project.

### The key idea: a dispatch table
At Stage 3 the loop hardcoded one tool: `result = read_file(tc["arguments"]["path"])`. That doesn't scale to many tools with different args. The fix is a **name → function table** plus `fn(**args)` to spread the model's parsed argument dict into the function's named parameters:
```python
TOOLS = {
    "read_file": read_file,
    "read_directory": read_directory,
    "glob": glob_files,      # tool name "glob" -> python function glob_files
    "grep": grep,
}
...
name = tc["name"]
tool_args = tc["arguments"]
print(f"\n [running {name}: {tool_args}]")
fn = TOOLS.get(name)
result = fn(**tool_args) if fn else f"Error: unknown tool '{name}'"
```
**The loop body never changes again** — adding a tool = write an executor + a JSON definition + a `TOOLS` entry. The `.get(name)` + fallback also turns a hallucinated tool name into a clean error instead of a crash.

### The new executors (in `main.py`)
```python
def read_directory(path="."):
    try:
        entries = sorted(os.listdir(path))
    except Exception as e:
        return f"Error listing {path}: {e}"
    lines = [f"{e}/" if os.path.isdir(os.path.join(path, e)) else e for e in entries]
    return f"{path} ({len(entries)} entries):\n" + "\n".join(lines)


def glob_files(pattern, path="."):
    matches = sorted(str(p) for p in Path(path).glob(pattern))
    if not matches:
        return f"No files match {pattern!r} in {path}"
    return f"{len(matches)} match(es) for {pattern!r}:\n" + "\n".join(matches)


def grep(pattern, directory="."):
    try:
        regex = re.compile(pattern)
    except re.error as e:
        return f"Invalid regex {pattern!r}: {e}"
    results = []
    for root, dirs, files in os.walk(directory):
        dirs[:] = [d for d in dirs
                   if not d.startswith(".") and d not in {"__pycache__", "node_modules", "venv", ".venv"}]
        for fn in files:
            fp = os.path.join(root, fn)
            try:
                with open(fp, encoding="utf-8", errors="replace") as f:
                    for i, line in enumerate(f, 1):
                        if regex.search(line):
                            results.append(f"{fp}:{i}: {line.rstrip()}")
                            if len(results) >= 100:
                                return "\n".join(results) + "\n[truncated at 100 matches]"
            except OSError:
                continue
    return "\n".join(results) if results else f"No matches for {pattern!r}"
```
Each one also needs a JSON definition appended to the `tools = [...]` list (same shape as `read_file`), and the system prompt was updated to mention all four tools. New imports: `os`, `re`, `from pathlib import Path`.

### Mistakes made & fixed
1. `from unittest import result` — yet another editor auto-import (after the `email`/`message` one in Stage 3). Unused and wrong; the real `result` is the local variable in the loop. Removed.
2. Renamed the loop's `args = tc["arguments"]` to `tool_args` — it was shadowing `args = parser.parse_args()`. Harmless (the Namespace was already consumed) but confusing.

### Verification ✅
```
$ python main.py --prompt "Which file defines the LLMClient class? Use grep."

 [running grep: {'pattern': 'class LLMClient'}]
 The `LLMClient` class is defined in `llm_client.py` (at line 6) ...
```
→ `grep` routed through the dispatch table, ran, and the model used the result. Other prompts to try: "What Python files are here?" (glob/read_directory) and "List the files, then summarize the project" (multi-tool chain).
_Verified 2026-06-06 against `kimi-k2.5`._

### What we learned
- A dispatch table (`name -> function`) + `fn(**parsed_args)` makes the agent loop tool-agnostic — the hard part is done once, then every new tool is just data + a small function.
- The model-facing **tool name** and the **python function name** don't have to match (`"glob"` → `glob_files`); the table maps between them.
- `dirs[:] = [...]` inside `os.walk` mutates the list in place to prune directories you don't want to descend into (`.git`, `__pycache__`, etc.).

### TODO / known issues
- [ ] No path confinement on any tool (read_directory/glob/grep can walk the whole disk) — same caveat as `read_file`.
- [ ] `grep` reads every non-skipped file fully; fine for small projects, slow on large trees. Capped at 100 matches.

## Stage 5: Write Files — with a Safety Gate

### Goal
Add `write_file` — the first tool that **changes the disk**. New files write freely, but **overwriting an existing file pauses the loop, shows a diff, and asks for confirmation**. The new idea isn't writing; it's putting a human in the loop before a destructive change.

### The key idea: confirm-before-overwrite
A read tool can run unattended. A *write* tool must not clobber your work silently. So the executor:
1. Path **doesn't exist** → just write it (no friction for new files).
2. Path **exists** → read the old content, build a `difflib.unified_diff`, print it, and block on `input()` for `y/n`.
3. You **decline** → return a `"User declined"` string. It goes back to the model as the tool result (the loop appends it like any other), so the model *sees* the refusal and reacts instead of assuming success.

### The executor (in `main.py`)
```python
import difflib  # added to imports

def write_file(path, content):
    p = Path(path)
    if p.exists():                                   # existing file -> confirm
        old = p.read_text(encoding="utf-8", errors="replace")
        diff = "".join(difflib.unified_diff(
            old.splitlines(keepends=True),
            content.splitlines(keepends=True),
            fromfile=path, tofile=path,
        ))
        print(f"\n--- proposed changes to {path} ---")
        print(diff or "(no textual changes)")
        if input(f"Overwrite {path}? [y/n] ").strip().lower() != "y":
            return f"User declined to overwrite {path}."
    p.parent.mkdir(parents=True, exist_ok=True)      # new file or confirmed
    p.write_text(content, encoding="utf-8")
    return f"Wrote {len(content)} characters to {path}."
```
Then registered in `TOOLS`, added to the `tools` JSON list (two required params: `path`, `content`), and the system prompt updated to mention it.

### Verification ✅
**New file** — writes with no prompt, and the model read it back to verify itself:
```
$ python main.py --prompt "Create hello.txt containing a short haiku about Python."
 [running write_file: {'path': 'hello.txt', 'content': '...'}]
 [running read_file: {'path': 'hello.txt'}]
 Done! I created hello.txt ...
```
**Overwrite** — diff + confirmation:
```
$ python main.py --prompt "Rewrite hello.txt with a haiku about the ocean instead."
--- proposed changes to hello.txt ---
@@ -1,3 +1,3 @@
-Silent whitespace speaks
-Elegant and clean it winds
-Python's gentle hiss
+Waves kiss the shoreline
+Salt air whispers secrets deep
+Endless blue horizon
Overwrite hello.txt? [y/n] y
```
→ `y` wrote the new haiku (confirmed on disk); `n` returns "User declined" to the model. _Verified 2026-06-06 against `kimi-k2.5`._

### What we learned
- A write tool needs a **human in the loop** — show the change (a diff) and get explicit approval before overwriting.
- `difflib.unified_diff` produces the git-style `-`/`+` view from two lists of lines (use `splitlines(keepends=True)`).
- Returning a refusal **as the tool result** keeps the model informed — a decline is data, not an error.
- The model often **reads a file before/after writing** to ground and verify itself — emergent behaviour, not coded.

### TODO / known issues
- [ ] An auto-confirm flag (e.g. `--yes`) for non-interactive runs — an overwrite currently always blocks on `input()`.
- [ ] No path confinement — `write_file` can write anywhere on disk (same caveat as the read tools).
- [ ] Tidy-up: a duplicate `import difflib` and two stray autocomplete words left in comments (`...overwriting.Path`, `...write.from`).

## Stage 6: Run Shell Commands (`bash`) — the Capstone

### Goal
Give the agent a `bash` tool to run shell commands — the most powerful *and* most dangerous tool. It reuses Stage 5's human-in-the-loop, plus two new ideas: **classify the command** (read-only vs. risky) and **run an external process safely** (capture output + exit code, with a timeout).

### The key ideas
1. **Allow-list + deny-list, default to ask.** A command runs unattended only if its first word is a known read-only one *and* it has no destructive token. Anything else — `rm`, a `>` redirect, or an unrecognized command — hits the same `y/n` gate from Stage 5. *Unknown ⇒ ask* is the safe default.
2. **Capture, don't inherit.** `subprocess.run(..., capture_output=True, text=True)` grabs stdout+stderr as strings so they can be returned *to the model* (it needs the output to reason).
3. **Timeout.** `timeout=30` turns a hung command into a `TimeoutExpired` we catch, instead of freezing the loop.

### The executor (in `main.py`)
```python
import subprocess

READ_ONLY = {"ls", "dir", "cat", "type", "echo", "pwd", "whoami", "head", "tail",
             "grep", "find", "findstr", "wc", "date", "where", "which", "python", "pip", "git"}
DANGEROUS = ("rm", "del", "rmdir", "rd", "mv", "move", "format", "dd", ">",
             "shutdown", "reboot", "kill", "mkfs")

def run_bash(command):
    cmd = command.strip()
    first = cmd.split()[0].lower() if cmd.split() else ""
    risky = first not in READ_ONLY or any(tok in cmd.lower() for tok in DANGEROUS)
    if risky:
        print(f"\n--- about to run a non-read-only command ---\n  {cmd}")
        try:
            answer = input("Run this command? [y/n] ").strip().lower()
        except EOFError:                      # no TTY (piped / non-interactive)
            return f"No confirmation available (non-interactive); skipped: {cmd}"
        if answer != "y":
            return f"User declined to run: {cmd}"
    try:
        r = subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=30)
    except subprocess.TimeoutExpired:
        return f"Command timed out after 30s: {cmd}"
    out = ((r.stdout or "") + (r.stderr or "")).strip()
    return f"exit code {r.returncode}\n{out or '(no output)'}"
```
Then registered as `"bash": run_bash` in `TOOLS`, added to the `tools` JSON list (`command` required), and the system prompt updated to list all six tools.

### Verification ✅
```
$ python main.py --prompt "Run dir with the bash tool, then tell me how many files you see."
 [running bash: {'command': 'ls'}]
 I ran ls in the current directory. I can see 10 items: 1 directory (__pycache__) and 9 files ...
```
→ `ls` is in the allow-list, so it ran with **no prompt**; `subprocess` captured the listing and the model summarized it accurately. A separate `python3 --version` attempt was correctly flagged risky (only `python` is allow-listed, not `python3`) and **paused for confirmation**. _Verified 2026-06-06 against `kimi-k2.5`._

### What we learned
- The Stage 5 pattern generalizes: **classify, then gate the risky path** — only the *test* for "risky" changes per tool.
- **Default-to-ask** is the safe posture: treat *unknown* as risky, not safe.
- A tool must return command output **as a string** to the model — capture stdout/stderr instead of letting them print to the terminal.
- `input()` raises `EOFError` with no TTY; catching it (return a "skipped" result) keeps non-interactive runs from crashing.

### TODO / known issues
- [ ] Substring matching in `DANGEROUS` (e.g. `"rm"`, `"rd"`) over-flags commands that merely *contain* those letters — safe (over-asks), just eager; word-boundary matching would be tighter.
- [ ] Deny-list classifier can be phrased around (`sed -i`, piping to a shell). Fine for learning; a real agent needs sandboxing.
- [ ] No path/permission confinement on any tool — the agent can read/write/run anywhere the user can.

## Stage 7: Interactive REPL (Extension)

### Goal
Turn the one-shot CLI into a **conversation**. Instead of running one prompt and exiting, keep reading input and **remember everything across turns** — so a follow-up like "what about that file?" just works.

### The concept: a *turn* vs. a *conversation*
- A **turn** = the agent loop you already had — stream, run tools, repeat until a final answer.
- A **conversation** = many turns sharing **one** `messages` list.

The refactor is two moves:
1. **Extract `agent_turn(client, messages)`** — lift the inner loop out of `main()`. It mutates the shared `messages` in place (appends the assistant reply + any tool messages).
2. **Persist `messages`** — build it **once** (just the system message) *above* a `while` loop. Each turn: read input → append a user message → `agent_turn(...)`. Because the list carries over, the model sees the entire history (including earlier tool results) — that's conversation memory.

> The one trap: initialise `messages` **above** the loop, not inside it. Build it inside and you get amnesia every turn.

### The code (in `main.py`)
```python
async def agent_turn(client, messages):
    """One assistant turn: stream, run tools, loop until a final answer.
    Mutates `messages` in place."""
    for _ in range(5):
        text, tool_calls = "", []
        async for event_type, data in client.chat_stream(messages=messages, tools=tools):
            if event_type == "text":
                text += data
                print(data, end="", flush=True)
            elif event_type == "tool_call":
                tool_calls.append(data)
        if not tool_calls:
            messages.append({"role": "assistant", "content": text})
            break
        for tc in tool_calls:
            messages.append({"role": "assistant", "content": None, "tool_calls": [{
                "id": tc["id"], "type": "function",
                "function": {"name": tc["name"], "arguments": json.dumps(tc["arguments"])}}]})
            name, tool_args = tc["name"], tc["arguments"]
            print(f"\n [running {name}: {tool_args}]")
            fn = TOOLS.get(name)
            result = fn(**tool_args) if fn else f"Error: unknown tool '{name}'"
            messages.append({"role": "tool", "tool_call_id": tc["id"], "content": result})
    print()


async def main():
    ...
    messages = [{"role": "system", "content": SYSTEM_PROMPT}]   # created ONCE -> persists

    if args.prompt:                       # single-shot mode, unchanged behaviour
        messages.append({"role": "user", "content": args.prompt})
        await agent_turn(client, messages)
        return

    print("TONY REPL — ask me anything. Type /exit (or Ctrl+C) to quit.")
    while True:                           # the conversation
        try:
            user = input("\nYou: ").strip()
        except (EOFError, KeyboardInterrupt):
            print("\nBye"); break
        if not user:
            continue
        if user in ("/exit", "/quit"):
            print("Bye"); break
        messages.append({"role": "user", "content": user})
        await agent_turn(client, messages)
```

### Verification ✅
Two piped turns where the second depends on the first:
```
You: Remember the number 42.                 -> "I've remembered the number 42..."
You: What number did I ask you to remember?  -> "42"          <- recalled across turns
You: /exit                                   -> "Bye"
```
The model answered "42" with no re-prompting — proof `messages` persisted. Single-shot (`--prompt`) still works unchanged. _Verified 2026-06-07 against `kimi-k2.5`._

### What we learned
- Separating **one turn** (the tool loop) from **the conversation** (the outer loop) is the key structural move — the loop becomes a reusable function.
- **Conversation memory is just a list you don't throw away** — persist `messages` across turns and the model "remembers" for free.
- Handle the exits: `/exit`/`/quit`, empty input (skip), and `EOFError`/`KeyboardInterrupt` (Ctrl+C or piped EOF) so quitting never tracebacks.

### TODO / known issues
- [ ] No context-window management — `messages` grows unbounded across a long session; eventually trim or summarize old turns.
- [ ] Cosmetic: `agent_turn` docstring typos ("trun"/"assistan"), and a double `print()` (turn end + `main`) adds an extra blank line between turns.

## Stage 8: Modularize + a CLI Banner

### Goal
Two things at once: **split the clumsy ~340-line `main.py` into focused modules**, and give the REPL a proper **CLI banner** (`rich` + `pyfiglet`) so it feels like a real tool. New deps: `rich`, `pyfiglet`.

### Before → after
`main.py` was doing five jobs (config wiring, tool schemas, executors, the agent loop, the REPL). Now each file has one:

| Module | Responsibility |
|---|---|
| `config.py` | `.env` → `Config` |
| `llm_client.py` | streaming OpenAI client |
| `tools.py` | executors + `TOOLS` registry + `TOOL_DEFINITIONS` + safety lists |
| `agent.py` | `SYSTEM_PROMPT` + `agent_turn()` (the loop) |
| `banner.py` | `show_banner()` — wordmark + status line |
| `main.py` | argparse + wire-up + REPL (≈45 lines) |

### What we learned
- **One file, one job.** The agent loop doesn't need to know how `grep` works; `main.py` doesn't need to know the message protocol. The boundaries show up as imports: `agent.py` does `from tools import TOOLS, TOOL_DEFINITIONS`; `main.py` imports `agent` + `banner`.
- **Module-level globals become imports.** The old loop referenced module globals `tools`/`TOOLS`; now `agent_turn` imports them, so it works regardless of who calls it.
- **A banner is just composed renderables.** `pyfiglet` turns text into block art; `rich` colors it (a top→bottom neon gradient), centers each word, and frames it in a rounded `Panel` with a status line.
- **Force UTF-8 at the entry point.** `sys.stdout.reconfigure(encoding="utf-8", errors="replace")` at the very top of `main.py` fixes the `�` em-dashes *and* the box-drawing/emoji crash on legacy Windows consoles — do it before anything prints.

### The banner (`banner.py`)
```python
from pyfiglet import Figlet
from rich.align import Align
from rich.box import ROUNDED
from rich.console import Console, Group
from rich.panel import Panel
from rich.text import Text

NEON = ["#9becff", "#5cd2ff", "#2bb4ff", "#1e9bff", "#1380e6", "#0a6bd0"]

def _word_art(word, font="ansi_shadow", start=0):
    fig = Figlet(font=font, width=200)
    t = Text()
    for i, line in enumerate(fig.renderText(word).rstrip("\n").split("\n")):
        t.append(line + "\n", style=f"bold {NEON[min(start + i, len(NEON) - 1)]}")
    return Align.center(t)            # left-aligned art, centered as one block

def show_banner(model=None, console=None):
    console = console or Console()
    body = Group(_word_art("TONY"), ..., status_line, tagline)
    console.print(Panel(body, box=ROUNDED, border_style="bright_cyan", padding=(1, 4)))
```
> Layout gotcha: a single wide wordmark wraps and scrambles inside the panel. The fix (same as the NANO screenshot) is to render each word separately and center it as a *block* — `Align.center` keeps the block art aligned instead of centering each line individually.

Single-shot (`--prompt`) and the REPL both work against `kimi-k2.5`; all six modules compile and import cleanly. _Verified 2026-06-08._

## 🏁 Done — the full agent

Eight stages — six focused modules (~440 lines total; `main.py` just ~45): a streaming, multi-tool, safety-gated, **conversational** coding agent with a `rich` + `pyfiglet` CLI banner.

| Tool(s) | Action | Safety |
|---|---|---|
| `read_file`, `read_directory`, `glob`, `grep` | read-only exploration | none needed |
| `write_file` | create / edit files | diff + confirm on overwrite |
| `bash` | run shell commands | confirm on risky / unknown commands |

**Possible next steps:** a `--yes` auto-confirm flag, path confinement to a workspace, context-window trimming for long sessions, more tools (HTTP fetch, apply-patch), or porting the OpenAI-style calls to the Anthropic API.
